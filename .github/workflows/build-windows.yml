name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies (MSYS2)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake

      - name: Build release
        shell: bash
        run: |
          ./script/bootstrap -y || echo "Bootstrap skipped or partial"
          cargo build --release --features gui --bin warp-oss

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/release/warp-oss.exe artifacts/ || cp target/release/warp.exe artifacts/ || echo "Binary not found"

          # Create zip archive
          cd artifacts
          7z a ../warp-windows-x86_64.zip . || tar -czf ../warp-windows-x86_64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: warp-windows-x86_64
          path: |
            warp-windows-x86_64.zip
            warp-windows-x86_64.tar.gz
          retention-days: 30

      - name: Create GitHub Release
        if: >
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            warp-windows-x86_64.zip
            warp-windows-x86_64.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-msvc:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Visual C++ Build Tools
        uses: microsoft/setup-msbuild@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-msvc-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-msvc-cargo-

      - name: Build release (MSVC)
        shell: bash
        run: |
          ./script/bootstrap -y || echo "Bootstrap skipped or partial"
          cargo build --release --features gui --bin warp-oss --target x86_64-pc-windows-msvc

      - name: Prepare artifacts (MSVC)
        shell: bash
        run: |
          mkdir -p artifacts-msvc
          cp target/x86_64-pc-windows-msvc/release/warp-oss.exe artifacts-msvc/ || cp target/x86_64-pc-windows-msvc/release/warp.exe artifacts-msvc/ || echo "Binary not found"

          cd artifacts-msvc
          7z a ../warp-windows-x86_64-msvc.zip . || tar -czf ../warp-windows-x86_64-msvc.tar.gz .

      - name: Upload artifact (MSVC)
        uses: actions/upload-artifact@v4
        with:
          name: warp-windows-x86_64-msvc
          path: |
            warp-windows-x86_64-msvc.zip
            warp-windows-x86_64-msvc.tar.gz
          retention-days: 30

      - name: Create GitHub Release (MSVC)
        if: >
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            warp-windows-x86_64-msvc.zip
            warp-windows-x86_64-msvc.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
